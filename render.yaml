services:
  - name: med-easy-hospital
    type: web
    plan: free
    runtime: image
    image:
      url: ghcr.io/YOUR_GITHUB_USERNAME/med-easy-hospital:latest
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

