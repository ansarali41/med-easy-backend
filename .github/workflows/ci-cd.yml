name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/med-easy

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - hospital
          - appointment
          - patient
          - prescription
          - pharmacy
          - billing
          - notification
          - lab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: hospital
            secret: RENDER_DEPLOY_HOOK_HOSPITAL
          - service: appointment
            secret: RENDER_DEPLOY_HOOK_APPOINTMENT
          - service: patient
            secret: RENDER_DEPLOY_HOOK_PATIENT
          - service: prescription
            secret: RENDER_DEPLOY_HOOK_PRESCRIPTION
          - service: pharmacy
            secret: RENDER_DEPLOY_HOOK_PHARMACY
          - service: billing
            secret: RENDER_DEPLOY_HOOK_BILLING
          - service: notification
            secret: RENDER_DEPLOY_HOOK_NOTIFICATION
          - service: lab
            secret: RENDER_DEPLOY_HOOK_LAB

    steps:
      - name: Trigger Render deploy (${{ matrix.service }})
        env:
          HOOK_URL: ${{ secrets[matrix.secret] }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "No deploy hook set for ${{ matrix.service }}, skipping."
            exit 0
          fi
          curl -s --fail "$HOOK_URL"
