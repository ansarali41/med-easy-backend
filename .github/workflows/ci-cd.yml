name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/med-easy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve which services to build ──────────────────────────────────────────
  # On push to main  → all services
  # On PR            → only services matching deploy:<name> or deploy:all labels
  setup:
    name: Resolve services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.resolve.outputs.services }}

    steps:
      - name: Resolve service matrix from labels
        id: resolve
        run: |
          ALL='["hospital","appointment","patient","prescription","pharmacy","billing","notification","lab"]'

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Push to main — deploying all services"
            echo "services=$ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "PR labels: $LABELS"

          if echo "$LABELS" | grep -q '"deploy:all"'; then
            echo "Label deploy:all found — deploying all services"
            echo "services=$ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICES="["
          FIRST=true
          for svc in hospital appointment patient prescription pharmacy billing notification lab; do
            if echo "$LABELS" | grep -q "\"deploy:$svc\""; then
              [ "$FIRST" = true ] && FIRST=false || SERVICES="$SERVICES,"
              SERVICES="${SERVICES}\"$svc\""
            fi
          done
          SERVICES="${SERVICES}]"

          echo "Selected services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  # ── Build & push Docker images ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.services != '[]' && needs.setup.outputs.services != '' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Deploy to Render ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: hospital
            secret: RENDER_DEPLOY_HOOK_HOSPITAL
          - service: appointment
            secret: RENDER_DEPLOY_HOOK_APPOINTMENT
          - service: patient
            secret: RENDER_DEPLOY_HOOK_PATIENT
          - service: prescription
            secret: RENDER_DEPLOY_HOOK_PRESCRIPTION
          - service: pharmacy
            secret: RENDER_DEPLOY_HOOK_PHARMACY
          - service: billing
            secret: RENDER_DEPLOY_HOOK_BILLING
          - service: notification
            secret: RENDER_DEPLOY_HOOK_NOTIFICATION
          - service: lab
            secret: RENDER_DEPLOY_HOOK_LAB

    steps:
      - name: Trigger Render deploy (${{ matrix.service }})
        env:
          HOOK_URL: ${{ secrets[matrix.secret] }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "No deploy hook set for ${{ matrix.service }}, skipping."
            exit 0
          fi
          curl -s --fail "$HOOK_URL"
